<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StarWay - Manyetosfer 2D Simülasyonu (Tam Ekran)</title>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #02050d; overflow: hidden; font-family: 'Rajdhani', sans-serif; }
    #simCanvas { display: block; width: 100%; height: 100vh; background: #03070f; cursor: crosshair; }
    .controls-panel {
        position: fixed;
        top: 20px;
        right: 20px;
        z-index: 100;
        background: rgba(6,13,26,0.95);
        backdrop-filter: blur(12px);
        border: 1px solid rgba(0,212,255,0.4);
        border-radius: 12px;
        padding: 12px 16px;
        font-family: 'Space Mono', monospace;
        font-size: 12px;
        color: #5a7a9f;
        min-width: 170px;
        pointer-events: auto;
    }
    .controls-panel h4 { color: #00d4ff; margin-bottom: 8px; font-size: 11px; letter-spacing: 2px; }
    .controls-panel input { width: 100%; margin: 5px 0; height: 4px; cursor: pointer; }
    .controls-panel .value { color: #ffd700; font-weight: bold; }
    .close-btn {
        position: fixed;
        top: 20px;
        left: 20px;
        z-index: 100;
        background: rgba(255,59,59,0.2);
        border: 1px solid #ff3b3b;
        color: #ff3b3b;
        padding: 6px 14px;
        border-radius: 6px;
        cursor: pointer;
        font-family: monospace;
        font-size: 12px;
        pointer-events: auto;
    }
    .close-btn:hover { background: #ff3b3b; color: #fff; }
    .fullscreen-btn {
        position: fixed;
        bottom: 20px;
        right: 20px;
        z-index: 100;
        background: rgba(0,212,255,0.2);
        border: 1px solid #00d4ff;
        color: #00d4ff;
        padding: 8px 16px;
        border-radius: 8px;
        cursor: pointer;
        font-family: monospace;
        font-size: 12px;
        pointer-events: auto;
    }
    .fullscreen-btn:hover { background: #00d4ff; color: #000; }
    .info {
        position: fixed;
        bottom: 20px;
        left: 20px;
        background: rgba(0,0,0,0.6);
        padding: 6px 12px;
        border-radius: 20px;
        font-family: monospace;
        font-size: 11px;
        color: #88aadd;
        pointer-events: none;
    }
</style>
</head>
<body>
<canvas id="simCanvas"></canvas>
<div class="controls-panel">
    <h4>⚙ MANYETOSFER 2D</h4>
    <div>Kp: <span id="kpVal" class="value">3.0</span></div>
    <input type="range" id="kpSlider" min="0" max="9" step="0.1" value="3">
    <div style="margin-top: 8px;">Rüzgar: <span id="windVal" class="value">400</span> km/s</div>
    <input type="range" id="windSlider" min="200" max="1200" step="10" value="400">
</div>
<button class="close-btn" onclick="window.close()">✕ Kapat</button>
<button class="fullscreen-btn" id="fullscreenBtn">🔲 Tam Ekran</button>
<div class="info">🌊 Güneş Rüzgarı Parçacıkları | Manyetik alan çizgileri</div>

<script>
const canvas = document.getElementById('simCanvas');
let ctx = canvas.getContext('2d');
let width, height;
let currentKp = 3.0;
let currentWind = 400;

// Parçacık sınıfı
class Particle {
    constructor() {
        this.reset();
    }
    reset() {
        this.x = Math.random() * -100;
        this.y = Math.random() * canvas.height;
        this.vx = (Math.random() * 1.5 + 0.8) * (currentWind / 220);
        this.vy = (Math.random() - 0.5) * 0.5;
        this.baseVx = this.vx;
        this.radius = Math.random() * 2 + 1;
    }
    update(ex, ey, R, bend) {
        const dx = this.x - ex, dy = this.y - ey;
        const dist = Math.sqrt(dx*dx + dy*dy);
        const mpR = R * (2.3 - bend * 0.85);

        if (dist < mpR && dist > R * 1.1) {
            const r3 = dist * dist * dist;
            const mx = 0, my = -1;
            const rdotm = (dx*mx + dy*my) / dist;
            let bx = (3 * rdotm * dx / dist - mx) / r3 * 6000;
            let by = (3 * rdotm * dy / dist - my) / r3 * 6000;
            if (dx < 0) { bx *= (1 - bend * 0.4); }
            else { bx *= (1 + bend * 0.25); by *= (1 + bend * 0.2); }
            const bMag = Math.sqrt(bx*bx + by*by) || 1;
            const tx = bx / bMag, ty = by / bMag;
            const cross = this.vx * ty - this.vy * tx;
            const strength = Math.min(0.35, bMag * dist * 0.006) * (1 - dist/mpR);
            this.vx += -ty * cross * strength;
            this.vy += tx * cross * strength;
        } else {
            this.vx += (this.baseVx - this.vx) * 0.05;
            this.vy *= 0.99;
        }

        if (dist < R * 1.05) {
            const nx = dx/dist, ny = dy/dist;
            const dot = this.vx*nx + this.vy*ny;
            this.vx -= 1.5 * dot * nx;
            this.vy -= 1.5 * dot * ny;
        }

        this.x += this.vx;
        this.y += this.vy;

        if (this.x > canvas.width + 30 || this.x < -40 || this.y < -30 || this.y > canvas.height + 30) {
            this.reset();
        }
    }
    draw() {
        let color = currentWind > 700 ? '#ff4444' : (currentWind > 500 ? '#ffaa44' : '#88aaff');
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
        ctx.fillStyle = color;
        ctx.fill();
    }
}

let particles = [];
let earthImg = null;
let earthRot = 0;

function initParticles() {
    particles = [];
    for (let i = 0; i < 350; i++) particles.push(new Particle());
}

function drawFieldLines(ex, ey, R, bend) {
    for (let li = 0; li < 8; li++) {
        const L = R * (1.4 + li * 0.45);
        ctx.beginPath();
        let first = true;
        for (let si = 0; si <= 80; si++) {
            const theta = (si / 80) * Math.PI - Math.PI / 2;
            const r = L * Math.cos(theta) * Math.cos(theta);
            if (r < R * 0.95) continue;
            const comp = Math.cos(theta) < 0 ? (1 - bend * 0.5) : (1 + bend * 0.3);
            const px = ex + r * Math.cos(theta) * comp;
            const py = ey + r * Math.sin(theta);
            if (first) { ctx.moveTo(px, py); first = false; }
            else ctx.lineTo(px, py);
        }
        for (let si = 80; si >= 0; si--) {
            const theta = (si / 80) * Math.PI + Math.PI / 2;
            const r = L * Math.cos(theta - Math.PI) * Math.cos(theta - Math.PI);
            if (r < R * 0.95) continue;
            const px = ex - r * Math.cos(theta - Math.PI) * (1 + bend * 0.5);
            const py = ey + r * Math.sin(theta - Math.PI);
            ctx.lineTo(px, py);
        }
        ctx.strokeStyle = `rgba(100, 180, 255, ${0.3 + li * 0.04})`;
        ctx.lineWidth = 1.2;
        ctx.stroke();
    }

    ctx.beginPath();
    const mpR = R * (2.3 - bend * 0.85);
    for (let a = -Math.PI/2; a <= Math.PI/2; a += 0.05) {
        const px = ex + mpR * Math.cos(a);
        const py = ey + mpR * Math.sin(a) * 1.4;
        if (a <= -Math.PI/2 + 0.05) ctx.moveTo(px, py);
        else ctx.lineTo(px, py);
    }
    ctx.strokeStyle = `rgba(0, 212, 255, 0.5)`;
    ctx.setLineDash([5, 5]);
    ctx.stroke();
    ctx.setLineDash([]);
}

function animate() {
    if (!ctx) return;

    ctx.fillStyle = 'rgba(2, 5, 13, 0.25)';
    ctx.fillRect(0, 0, width, height);

    const R = Math.min(height * 0.18, 70);
    const ex = width / 2 + R;
    const ey = height / 2;
    const bend = Math.min(0.85, Math.max(0.1, (currentWind - 300) / 500 + (currentKp - 3) / 12));

    drawFieldLines(ex, ey, R, bend);

    ctx.save();
    ctx.beginPath();
    ctx.arc(ex, ey, R, 0, Math.PI * 2);
    ctx.clip();

    ctx.fillStyle = '#2a6fb0';
    ctx.beginPath();
    ctx.arc(ex, ey, R, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#4a8fcc';
    ctx.beginPath();
    ctx.arc(ex - 3, ey - 3, R * 0.3, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();

    const atmGrd = ctx.createRadialGradient(ex, ey, R * 0.9, ex, ey, R * 1.2);
    atmGrd.addColorStop(0, 'rgba(0, 100, 200, 0.1)');
    atmGrd.addColorStop(1, 'rgba(0, 200, 255, 0.2)');
    ctx.beginPath();
    ctx.arc(ex, ey, R * 1.2, 0, Math.PI * 2);
    ctx.fillStyle = atmGrd;
    ctx.fill();

    particles.forEach(p => {
        p.update(ex, ey, R, bend);
        p.draw();
    });

    ctx.fillStyle = '#88aaff';
    ctx.font = 'bold 12px monospace';
    ctx.fillText(`${Math.round(currentWind)} km/s`, 15, 30);
    ctx.fillStyle = '#ffaa66';
    ctx.fillText(`Kp ${currentKp.toFixed(1)}`, 15, 55);

    requestAnimationFrame(animate);
}

function resizeCanvas() {
    width = window.innerWidth;
    height = window.innerHeight;
    canvas.width = width;
    canvas.height = height;
    initParticles();
}

// UI
const kpSlider = document.getElementById('kpSlider');
const windSlider = document.getElementById('windSlider');
const kpValSpan = document.getElementById('kpVal');
const windValSpan = document.getElementById('windVal');

kpSlider.addEventListener('input', (e) => {
    currentKp = parseFloat(e.target.value);
    kpValSpan.textContent = currentKp.toFixed(1);
});
windSlider.addEventListener('input', (e) => {
    currentWind = parseInt(e.target.value);
    windValSpan.textContent = currentWind;
});

window.addEventListener('message', (e) => {
    if (e.data.type === 'INIT_SIM2D') {
        currentKp = e.data.kp || 3;
        currentWind = e.data.wind || 400;
        kpSlider.value = currentKp;
        windSlider.value = currentWind;
        kpValSpan.textContent = currentKp.toFixed(1);
        windValSpan.textContent = currentWind;
        initParticles();
    } else if (e.data.type === 'UPDATE_DATA') {
        currentKp = e.data.kp || currentKp;
        currentWind = e.data.wind || currentWind;
        kpSlider.value = currentKp;
        windSlider.value = currentWind;
        kpValSpan.textContent = currentKp.toFixed(1);
        windValSpan.textContent = currentWind;
    }
});

document.getElementById('fullscreenBtn').addEventListener('click', () => {
    if (!document.fullscreenElement) document.documentElement.requestFullscreen();
    else document.exitFullscreen();
});

resizeCanvas();
animate();
window.addEventListener('resize', resizeCanvas);
</script>
</body>
</html>
