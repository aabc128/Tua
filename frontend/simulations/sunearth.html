<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StarWay - Güneş-Dünya 3D Simülasyonu (Tam Ekran)</title>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
        background: #010007;
        overflow: hidden;
        font-family: 'Rajdhani', sans-serif;
    }
    #controls {
        position: fixed;
        bottom: 20px;
        left: 20px;
        z-index: 100;
        background: rgba(0,0,0,0.8);
        backdrop-filter: blur(10px);
        padding: 10px 16px;
        border-radius: 8px;
        color: #00d4ff;
        font-size: 12px;
        font-family: monospace;
        pointer-events: none;
    }
    .controls-panel {
        position: fixed;
        top: 20px;
        right: 20px;
        z-index: 100;
        background: rgba(6,13,26,0.95);
        backdrop-filter: blur(12px);
        border: 1px solid rgba(0,212,255,0.4);
        border-radius: 12px;
        padding: 12px 16px;
        font-family: 'Space Mono', monospace;
        font-size: 12px;
        color: #5a7a9f;
        min-width: 170px;
        pointer-events: auto;
    }
    .controls-panel h4 { color: #00d4ff; margin-bottom: 8px; font-size: 11px; letter-spacing: 2px; }
    .controls-panel input { width: 100%; margin: 5px 0; height: 4px; cursor: pointer; }
    .controls-panel .value { color: #ffd700; font-weight: bold; }
    .close-btn {
        position: fixed;
        top: 20px;
        left: 20px;
        z-index: 100;
        background: rgba(255,59,59,0.2);
        border: 1px solid #ff3b3b;
        color: #ff3b3b;
        padding: 6px 14px;
        border-radius: 6px;
        cursor: pointer;
        font-family: monospace;
        font-size: 12px;
        transition: all 0.2s;
        pointer-events: auto;
    }
    .close-btn:hover { background: #ff3b3b; color: #fff; }
    .fullscreen-btn {
        position: fixed;
        bottom: 20px;
        right: 20px;
        z-index: 100;
        background: rgba(0,212,255,0.2);
        border: 1px solid #00d4ff;
        color: #00d4ff;
        padding: 8px 16px;
        border-radius: 8px;
        cursor: pointer;
        font-family: monospace;
        font-size: 12px;
        transition: all 0.2s;
        pointer-events: auto;
    }
    .fullscreen-btn:hover { background: #00d4ff; color: #000; }
    @media (max-width: 768px) {
        .controls-panel { font-size: 10px; padding: 8px 12px; min-width: 140px; }
        .close-btn, .fullscreen-btn { padding: 4px 10px; font-size: 10px; }
    }
</style>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
<div id="controls">
    🌞 Güneş-Dünya 3D | Fare ile döndürün | 🖱️ Sağ tık + sürükle = zoom
</div>
<div class="controls-panel">
    <h4>⚙ GÜNEŞ AKTİVİTESİ</h4>
    <div>Kp İndeksi: <span id="kpVal" class="value">3.0</span></div>
    <input type="range" id="kpSlider" min="0" max="9" step="0.1" value="3">
    <div style="margin-top: 8px;">Rüzgar: <span id="windVal" class="value">400</span> km/s</div>
    <input type="range" id="windSlider" min="200" max="1200" step="10" value="400">
    <div style="margin-top: 8px; font-size: 10px; color: #888;">🎮 Kaydırıcılar simülasyonu değiştirir</div>
</div>
<button class="close-btn" onclick="window.close()">✕ Kapat</button>
<button class="fullscreen-btn" id="fullscreenBtn">🔲 Tam Ekran</button>

<script type="importmap">
{
    "imports": {
        "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
    }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

let currentKp = 3.0;
let currentWind = 400;

// Scene setup
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x010007);
scene.fog = new THREE.FogExp2(0x010007, 0.0006);

const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
camera.position.set(0, 1.5, 12);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
renderer.shadowMap.enabled = true;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.enableZoom = true;
controls.zoomSpeed = 1.2;
controls.minDistance = 4;
controls.maxDistance = 25;

// Yıldızlar
const starGeo = new THREE.BufferGeometry();
const starCount = 4000;
const starPos = new Float32Array(starCount * 3);
for (let i = 0; i < starCount; i++) {
    starPos[i*3] = (Math.random() - 0.5) * 400;
    starPos[i*3+1] = (Math.random() - 0.5) * 200;
    starPos[i*3+2] = (Math.random() - 0.5) * 200 - 50;
}
starGeo.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
scene.add(new THREE.Points(starGeo, new THREE.PointsMaterial({ color: 0xffffff, size: 0.12, transparent: true, opacity: 0.7 })));

// Güneş
const sunRadius = 1.4;
const sunGeo = new THREE.SphereGeometry(sunRadius, 128, 128);
const sunMat = new THREE.MeshStandardMaterial({ color: 0xffaa55, emissive: 0xff4411, emissiveIntensity: 0.8 });
const sunMesh = new THREE.Mesh(sunGeo, sunMat);
sunMesh.position.set(-3.5, 0, 0);
scene.add(sunMesh);

// Güneş ışığı
const sunLight = new THREE.PointLight(0xffaa66, 2.5, 50);
sunLight.position.set(-3.5, 0, 0);
scene.add(sunLight);
scene.add(new THREE.AmbientLight(0x112233, 0.5));

// Korona
const coronaMat = new THREE.MeshPhongMaterial({ color: 0xff8844, transparent: true, opacity: 0.3, side: THREE.BackSide });
const corona = new THREE.Mesh(new THREE.SphereGeometry(sunRadius * 1.25, 48, 48), coronaMat);
corona.position.set(-3.5, 0, 0);
scene.add(corona);

// Dünya
const earthRadius = 0.68;
const textureLoader = new THREE.TextureLoader();
const earthMat = new THREE.MeshPhongMaterial({
    map: textureLoader.load('https://threejs.org/examples/textures/planets/earth_atmos_2048.jpg'),
    shininess: 25
});
const earthMesh = new THREE.Mesh(new THREE.SphereGeometry(earthRadius, 128, 128), earthMat);
earthMesh.position.set(3.5, 0, 0);
scene.add(earthMesh);

// Bulutlar
const cloudTex = textureLoader.load('https://threejs.org/examples/textures/planets/earth_clouds_1024.png');
const clouds = new THREE.Mesh(
    new THREE.SphereGeometry(earthRadius * 1.02, 128, 128),
    new THREE.MeshPhongMaterial({ map: cloudTex, transparent: true, opacity: 0.25 })
);
clouds.position.set(3.5, 0, 0);
scene.add(clouds);

// Partiküller
const PARTICLE_COUNT = 1500;
const pGeo = new THREE.BufferGeometry();
const pPos = new Float32Array(PARTICLE_COUNT * 3);
for (let i = 0; i < PARTICLE_COUNT; i++) {
    pPos[i*3] = -3.5 + sunRadius + Math.random() * 2;
    pPos[i*3+1] = (Math.random() - 0.5) * 2.5;
    pPos[i*3+2] = (Math.random() - 0.5) * 2.5;
}
pGeo.setAttribute('position', new THREE.BufferAttribute(pPos, 3));
const particles = new THREE.Points(pGeo, new THREE.PointsMaterial({ color: 0xff8844, size: 0.04, transparent: true, blending: THREE.AdditiveBlending }));
scene.add(particles);

// Animasyon
let time = 0;

function animate() {
    requestAnimationFrame(animate);
    time += 0.016;

    sunMesh.rotation.y += 0.002;
    earthMesh.rotation.y += 0.002;
    clouds.rotation.y += 0.0025;
    corona.rotation.y += 0.001;

    // Partikül hareketi
    const speed = Math.min(2.2, Math.max(0.5, currentWind / 350));
    const positions = pGeo.attributes.position.array;
    for (let i = 0; i < PARTICLE_COUNT; i++) {
        positions[i*3] += 0.008 * speed;
        if (positions[i*3] > 4.5) {
            positions[i*3] = -3.5 + sunRadius;
            positions[i*3+1] = (Math.random() - 0.5) * 2.5;
            positions[i*3+2] = (Math.random() - 0.5) * 2.5;
        }
    }
    pGeo.attributes.position.needsUpdate = true;

    // Güneş parlaklığı (Kp'ye göre)
    const intensity = 1.5 + currentKp * 0.15;
    sunLight.intensity = intensity;
    sunMat.emissiveIntensity = 0.5 + currentKp * 0.08;

    controls.update();
    renderer.render(scene, camera);
}
animate();

// UI
const kpSlider = document.getElementById('kpSlider');
const windSlider = document.getElementById('windSlider');
const kpValSpan = document.getElementById('kpVal');
const windValSpan = document.getElementById('windVal');

kpSlider.addEventListener('input', (e) => {
    currentKp = parseFloat(e.target.value);
    kpValSpan.textContent = currentKp.toFixed(1);
});
windSlider.addEventListener('input', (e) => {
    currentWind = parseInt(e.target.value);
    windValSpan.textContent = currentWind;
});

// Ana pencereden mesaj
window.addEventListener('message', (e) => {
    if (e.data.type === 'INIT_SUNEARTH') {
        currentKp = e.data.kp || 3;
        currentWind = e.data.wind || 400;
        kpSlider.value = currentKp;
        windSlider.value = currentWind;
        kpValSpan.textContent = currentKp.toFixed(1);
        windValSpan.textContent = currentWind;
    } else if (e.data.type === 'UPDATE_DATA') {
        currentKp = e.data.kp || currentKp;
        currentWind = e.data.wind || currentWind;
        kpSlider.value = currentKp;
        windSlider.value = currentWind;
        kpValSpan.textContent = currentKp.toFixed(1);
        windValSpan.textContent = currentWind;
    }
});

// Tam ekran
document.getElementById('fullscreenBtn').addEventListener('click', () => {
    if (!document.fullscreenElement) {
        document.documentElement.requestFullscreen();
    } else {
        document.exitFullscreen();
    }
});

window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
