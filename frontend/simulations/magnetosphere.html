<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StarWay - Manyetosfer 3D Simülasyonu (Tam Ekran)</title>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #010007; overflow: hidden; font-family: 'Rajdhani', sans-serif; }
    .controls-panel {
        position: fixed;
        top: 20px;
        right: 20px;
        z-index: 100;
        background: rgba(6,13,26,0.95);
        backdrop-filter: blur(12px);
        border: 1px solid rgba(0,212,255,0.4);
        border-radius: 12px;
        padding: 12px 16px;
        font-family: 'Space Mono', monospace;
        font-size: 12px;
        color: #5a7a9f;
        min-width: 170px;
        pointer-events: auto;
    }
    .controls-panel h4 { color: #00d4ff; margin-bottom: 8px; font-size: 11px; letter-spacing: 2px; }
    .controls-panel input { width: 100%; margin: 5px 0; height: 4px; cursor: pointer; }
    .controls-panel .value { color: #ffd700; font-weight: bold; }
    .close-btn {
        position: fixed;
        top: 20px;
        left: 20px;
        z-index: 100;
        background: rgba(255,59,59,0.2);
        border: 1px solid #ff3b3b;
        color: #ff3b3b;
        padding: 6px 14px;
        border-radius: 6px;
        cursor: pointer;
        font-family: monospace;
        font-size: 12px;
        pointer-events: auto;
    }
    .close-btn:hover { background: #ff3b3b; color: #fff; }
    .fullscreen-btn {
        position: fixed;
        bottom: 20px;
        right: 20px;
        z-index: 100;
        background: rgba(0,212,255,0.2);
        border: 1px solid #00d4ff;
        color: #00d4ff;
        padding: 8px 16px;
        border-radius: 8px;
        cursor: pointer;
        font-family: monospace;
        font-size: 12px;
        pointer-events: auto;
    }
    .fullscreen-btn:hover { background: #00d4ff; color: #000; }
</style>
</head>
<body>
<div class="controls-panel">
    <h4>⚙ MANYETOSFER</h4>
    <div>Kp: <span id="kpVal" class="value">3.0</span></div>
    <input type="range" id="kpSlider" min="0" max="9" step="0.1" value="3">
    <div style="margin-top: 8px;">Rüzgar: <span id="windVal" class="value">400</span> km/s</div>
    <input type="range" id="windSlider" min="200" max="1200" step="10" value="400">
</div>
<button class="close-btn" onclick="window.close()">✕ Kapat</button>
<button class="fullscreen-btn" id="fullscreenBtn">🔲 Tam Ekran</button>

<script type="importmap">
{
    "imports": {
        "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
    }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

let currentKp = 3.0;
let currentWind = 400;

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x010007);

const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 200);
camera.position.set(5, 3, 6);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.autoRotate = true;
controls.autoRotateSpeed = 0.5;

// Yıldızlar
const starGeo = new THREE.BufferGeometry();
const starPos = new Float32Array(2000 * 3);
for (let i = 0; i < 2000; i++) {
    starPos[i*3] = (Math.random() - 0.5) * 250;
    starPos[i*3+1] = (Math.random() - 0.5) * 150;
    starPos[i*3+2] = (Math.random() - 0.5) * 150 - 50;
}
starGeo.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
scene.add(new THREE.Points(starGeo, new THREE.PointsMaterial({ color: 0xffffff, size: 0.1 })));

// Dünya
const textureLoader = new THREE.TextureLoader();
const earth = new THREE.Mesh(
    new THREE.SphereGeometry(1.0, 128, 128),
    new THREE.MeshPhongMaterial({ map: textureLoader.load('https://threejs.org/examples/textures/planets/earth_atmos_2048.jpg') })
);
scene.add(earth);

// Işıklar
scene.add(new THREE.AmbientLight(0x112244, 0.6));
const dirLight = new THREE.DirectionalLight(0xffeedd, 1.2);
dirLight.position.set(5, 3, 2);
scene.add(dirLight);

// Manyetik alan çizgileri grubu
const fieldLinesGroup = new THREE.Group();
scene.add(fieldLinesGroup);

function createFieldLines(kp, wind) {
    while (fieldLinesGroup.children.length) fieldLinesGroup.remove(fieldLinesGroup.children[0]);

    const bend = Math.min(0.8, Math.max(0.05, (wind - 300) / 800 + (kp - 3) / 18));
    const LMax = Math.max(1.6, 3.8 - kp * 0.22);

    for (let li = 0; li < 8; li++) {
        const L = 1.3 + (li / 7) * (LMax - 1.3);
        const alpha = 0.4 + li * 0.05;

        for (let phi = 0; phi < 12; phi++) {
            const angle = (phi / 12) * Math.PI * 2;
            const points = [];

            for (let i = 0; i <= 80; i++) {
                const lam = (-Math.PI / 2) + (i / 80) * Math.PI;
                const r = L * Math.cos(lam) * Math.cos(lam);
                if (r < 0.95) continue;

                let x = r * Math.cos(lam) * Math.cos(angle);
                let y = r * Math.sin(lam);
                let z = r * Math.cos(lam) * Math.sin(angle);

                const night = Math.max(0, -x / (r + 0.01));
                x -= night * bend * 1.2 * r * 0.35;

                points.push(new THREE.Vector3(x, y, z));
            }

            if (points.length > 2) {
                const geo = new THREE.BufferGeometry().setFromPoints(points);
                const color = new THREE.Color().setHSL(0.55 - bend * 0.3, 1, 0.5);
                const mat = new THREE.LineBasicMaterial({ color: color, transparent: true, opacity: alpha });
                const line = new THREE.Line(geo, mat);
                fieldLinesGroup.add(line);
            }
        }
    }
}

// Partiküller
const pCount = 600;
const pGeo = new THREE.BufferGeometry();
const pPos = new Float32Array(pCount * 3);
for (let i = 0; i < pCount; i++) {
    pPos[i*3] = -5 + Math.random() * 3;
    pPos[i*3+1] = (Math.random() - 0.5) * 5;
    pPos[i*3+2] = (Math.random() - 0.5) * 5;
}
pGeo.setAttribute('position', new THREE.BufferAttribute(pPos, 3));
const particles = new THREE.Points(pGeo, new THREE.PointsMaterial({ color: 0xffaa66, size: 0.045, transparent: true, blending: THREE.AdditiveBlending }));
scene.add(particles);

function updateParticles() {
    const speed = Math.min(2.2, Math.max(0.5, currentWind / 320));
    const positions = pGeo.attributes.position.array;
    for (let i = 0; i < pCount; i++) {
        positions[i*3] += 0.025 * speed;
        if (positions[i*3] > 5) {
            positions[i*3] = -5;
            positions[i*3+1] = (Math.random() - 0.5) * 5;
            positions[i*3+2] = (Math.random() - 0.5) * 5;
        }
        const dx = positions[i*3], dy = positions[i*3+1], dz = positions[i*3+2];
        if (Math.sqrt(dx*dx + dy*dy + dz*dz) < 1.1) {
            positions[i*3] = -5;
        }
    }
    pGeo.attributes.position.needsUpdate = true;
    particles.material.color.setHSL(0.1 + (currentWind - 300) / 900, 1, 0.55);
}

let lastKp = -1, lastWind = -1;
function animate() {
    requestAnimationFrame(animate);

    if (Math.abs(currentKp - lastKp) > 0.1 || Math.abs(currentWind - lastWind) > 20) {
        createFieldLines(currentKp, currentWind);
        lastKp = currentKp;
        lastWind = currentWind;
    }

    updateParticles();
    earth.rotation.y += 0.002;
    controls.update();
    renderer.render(scene, camera);
}
animate();

// UI
const kpSlider = document.getElementById('kpSlider');
const windSlider = document.getElementById('windSlider');
const kpValSpan = document.getElementById('kpVal');
const windValSpan = document.getElementById('windVal');

kpSlider.addEventListener('input', (e) => {
    currentKp = parseFloat(e.target.value);
    kpValSpan.textContent = currentKp.toFixed(1);
});
windSlider.addEventListener('input', (e) => {
    currentWind = parseInt(e.target.value);
    windValSpan.textContent = currentWind;
});

window.addEventListener('message', (e) => {
    if (e.data.type === 'INIT_MAG') {
        currentKp = e.data.kp || 3;
        currentWind = e.data.wind || 400;
        kpSlider.value = currentKp;
        windSlider.value = currentWind;
        kpValSpan.textContent = currentKp.toFixed(1);
        windValSpan.textContent = currentWind;
        createFieldLines(currentKp, currentWind);
    } else if (e.data.type === 'UPDATE_DATA') {
        currentKp = e.data.kp || currentKp;
        currentWind = e.data.wind || currentWind;
        kpSlider.value = currentKp;
        windSlider.value = currentWind;
        kpValSpan.textContent = currentKp.toFixed(1);
        windValSpan.textContent = currentWind;
    }
});

document.getElementById('fullscreenBtn').addEventListener('click', () => {
    if (!document.fullscreenElement) document.documentElement.requestFullscreen();
    else document.exitFullscreen();
});

createFieldLines(3, 400);
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
